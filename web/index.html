<!DOCTYPE html>
<html>
    <head>
        <title>Guess The Gate</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700&display=swap');

            :root {
                --bg: #0a0e17;
                --panel: #111827;
                --border: #1e3a5f;
                --accent: #00d4ff;
                --accent2: #ff6b35;
                --text: #e2e8f0;
                --muted: #4a5568;
                --glow: 0 0 12px rgba(0, 212, 255, 0.4);
            }

            * { box-sizing: border-box; margin: 0; padding: 0; }

            body {
                background: var(--bg);
                color: var(--text);
                font-family: 'Share Tech Mono', monospace;
                height: 100dvh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: space-between;
                padding: 6vh 5vw;
                background-image:
                    radial-gradient(ellipse at 20% 50%, rgba(0, 212, 255, 0.04) 0%, transparent 60%),
                    radial-gradient(ellipse at 80% 20%, rgba(255, 107, 53, 0.04) 0%, transparent 60%);
            }

            h1 {
                font-family: 'Orbitron', sans-serif;
                font-size: clamp(1.4rem, 6vw, 2.4rem);
                letter-spacing: 0.15em;
                color: var(--accent);
                text-shadow: var(--glow);
                text-transform: uppercase;
                text-align: center;
            }

            #buttons {
                display: grid;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: 1fr 1fr;
                gap: 2vw;
                width: 100%;
                flex: 1;
                margin: 4vh 0;
            }

            button {
                background: var(--panel);
                color: var(--text);
                border: 1px solid var(--border);
                border-radius: 10px;
                font-family: 'Share Tech Mono', monospace;
                font-size: clamp(1.2rem, 5vw, 2rem);
                letter-spacing: 0.08em;
                cursor: pointer;
                transition: border-color 0.15s, color 0.15s, box-shadow 0.15s, transform 0.1s;
            }

            button:hover {
                border-color: var(--accent);
                color: var(--accent);
                box-shadow: var(--glow);
                transform: translateY(-2px);
            }

            button:active {
                transform: translateY(0);
            }

            #score {
                font-size: clamp(1rem, 3.5vw, 1.4rem);
                color: var(--muted);
                letter-spacing: 0.1em;
            }

            #score span {
                color: var(--accent);
            }
        </style>
    </head>
    <body>
        <h1>Guess The Gate</h1>

        <div id="buttons">
            <button id="option0"></button>
            <button id="option1"></button>
            <button id="option2"></button>
            <button id="option3"></button>
        </div>

        <h3 id="score">Score: <span>0</span></h3>

        <script>
            function options(opts) {
                for (let i = 0; i < 4; i++) {
                    const btn = document.getElementById("option" + i);
                    btn.innerHTML = opts[i];
                    btn.onclick = (function(index) {
                        return function() {
                            window.location.href = "/guess?option=" + index;
                        };
                    })(i);
                }
            }

            function score(s) {
                document.getElementById("score").innerHTML = "Score: <span>" + s + "</span>";
            }
        </script>
    </body>
</html>
